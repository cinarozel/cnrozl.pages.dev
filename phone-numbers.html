function draw() {
    const v1 = document.getElementById('i1').value.toLowerCase();
    const v2 = document.getElementById('i2').value.toLowerCase();
    const v3 = document.getElementById('i3').value.toLowerCase();
    const b = document.getElementById('tb');
    b.innerHTML = db.filter(u => {
        const n = lang === 'en' ? u.en : u.tr;
        return n.toLowerCase().includes(v1) && u.c.includes(v2) && (u.p.includes(v3) || u.a.includes(v3) || u.f.includes(v3));
    }).map(u => `<tr><td><b>${lang === 'en' ? u.en : u.tr}</b></td><td><span class="b">${u.c}</span></td><td>${u.p || '-'}</td><td>${u.a || '-'}</td><td>${u.f || '-'}</td></tr>`).join('');
}

    lang = lang === 'en' ? 'tr' : 'en';
    document.getElementById('t1').innerText = lang === 'en' ? "Global Emergency Numbers" : "Dünya Acil Durum Numaraları";
    document.getElementById('t2').innerText = lang === 'en' ? "Full list of countries & codes" : "Tüm ülkeler ve kodların tam listesi";
    document.getElementById('i1').placeholder = lang === 'en' ? "Search Country..." : "Ülke Ara...";
    document.getElementById('th').innerHTML = lang === 'en' ? "<th>Country</th><th>Code</th><th>Police</th><th>Ambulance</th><th>Fire</th>" : "<th>Ülke</th><th>Kod</th><th>Polis</th><th>Ambulans</th><th>İtfaiye</th>";
    draw();
}

document.querySelectorAll('input').forEach(i => i.addEventListener('input', draw));
draw();
</script>
</body>
</html>
